<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1f4a"/>
      <stop offset="50%" stop-color="#1a3a8f"/>
      <stop offset="100%" stop-color="#0f2d6e"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#f58220" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f58220" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <!-- Window grid pattern -->
  <g opacity="0.06" stroke="white" stroke-width="1">
    <rect x="100" y="80" width="280" height="400" rx="8"/>
    <line x1="240" y1="80" x2="240" y2="480"/>
    <line x1="100" y1="280" x2="380" y2="280"/>
    <rect x="420" y="80" width="280" height="400" rx="8"/>
    <line x1="560" y1="80" x2="560" y2="480"/>
    <line x1="420" y1="280" x2="700" y2="280"/>
    <rect x="740" y="80" width="280" height="400" rx="8"/>
    <line x1="880" y1="80" x2="880" y2="480"/>
    <line x1="740" y1="280" x2="1020" y2="280"/>
    <rect x="1060" y="80" width="280" height="400" rx="8"/>
    <line x1="1200" y1="80" x2="1200" y2="480"/>
    <line x1="1060" y1="280" x2="1340" y2="280"/>
    <rect x="1380" y="80" width="280" height="400" rx="8"/>
    <line x1="1520" y1="80" x2="1520" y2="480"/>
    <line x1="1380" y1="280" x2="1660" y2="280"/>
    <rect x="100" y="520" width="280" height="400" rx="8"/>
    <line x1="240" y1="520" x2="240" y2="920"/>
    <line x1="100" y1="720" x2="380" y2="720"/>
    <rect x="420" y="520" width="280" height="400" rx="8"/>
    <line x1="560" y1="520" x2="560" y2="920"/>
    <line x1="420" y1="720" x2="700" y2="720"/>
    <rect x="740" y="520" width="280" height="400" rx="8"/>
    <line x1="880" y1="520" x2="880" y2="920"/>
    <line x1="740" y1="720" x2="1020" y2="720"/>
    <rect x="1060" y="520" width="280" height="400" rx="8"/>
    <line x1="1200" y1="520" x2="1200" y2="920"/>
    <line x1="1060" y1="720" x2="1340" y2="720"/>
    <rect x="1380" y="520" width="280" height="400" rx="8"/>
    <line x1="1520" y1="520" x2="1520" y2="920"/>
    <line x1="1380" y1="720" x2="1660" y2="720"/>
  </g>
  <!-- Shine streaks -->
  <g opacity="0.04">
    <line x1="200" y1="0" x2="0" y2="400" stroke="white" stroke-width="80"/>
    <line x1="600" y1="0" x2="400" y2="400" stroke="white" stroke-width="60"/>
    <line x1="1400" y1="0" x2="1200" y2="400" stroke="white" stroke-width="40"/>
  </g>
  <!-- Water droplets -->
  <g opacity="0.08" fill="white">
    <circle cx="300" cy="200" r="3"/>
    <circle cx="850" cy="150" r="2"/>
    <circle cx="1100" cy="350" r="4"/>
    <circle cx="500" cy="600" r="2.5"/>
    <circle cx="1400" cy="500" r="3"/>
    <circle cx="200" cy="700" r="2"/>
    <circle cx="1600" cy="300" r="3.5"/>
    <circle cx="700" cy="800" r="2"/>
    <circle cx="1300" cy="700" r="3"/>
    <circle cx="960" cy="900" r="2.5"/>
  </g>
</svg>
